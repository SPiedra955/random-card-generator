<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Rigo with Vanilla.js</title>

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body>
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
  <div class="container-fluid text-center m-5">
    <div class="card">
      <span class="number">6</span>
    </div>
    <button type="button" class="btn btn-primary mt-3" onclick="window.location.reload()">
      New Card
    </button>
    <button type="button" class="btn btn-primary mt-3 btn-timer" onclick="generateCardTimer()">
      Timer
    </button>
    <div class="w-25 container-fluid text-center mt-3">
      <div class="mb-3">
        <label for="formGroupExampleInput" class="form-label">Introduce width</label>
        <input type="number" class="form-control width" id="formGroupExampleInput">
      </div>
      <div class="mb-3">
        <label for="formGroupExampleInput2" class="form-label">Introduce height</label>
        <input type="number" class="form-control height" id="formGroupExampleInput2">
      </div>
    </div>
  </div>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
</body>

</html>
